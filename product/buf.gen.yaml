version: v1
managed:
  enabled: true
  go_package_prefix:
    default: shopping/product/pb
    except:
      - buf.build/googleapis/googleapis
plugins:
  - name: go
    out: .
    opt:
      - paths=source_relative
  - name: go-grpc
    out: .
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  - name: grpc-gateway
    out: .
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
  - name: openapiv2
    out: internal/application/router/rest
    opt: 
      - allow_merge=true
      - merge_file_name=api
