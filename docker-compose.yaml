version: "3.8"

services:
  # monolith:
  #   container_name: monolith
  #   hostname: monolith
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile
  #   ports:
  #     - '8080:8080'
  #     - '8085:8085'
  #   env_file:
  #     - docker/.env
  #   depends_on:
  #     - postgres
  postgres:
    container_name: postgres
    hostname: postgres
    image: postgres:12-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: itsasecret
    ports:
      - '5432:5432'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'
      - './docker/database:/docker-entrypoint-initdb.d'
  pgAdmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=giangle2198@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=1
    links: 
      - postgres:postgres
    ports:
      - 83:80
    container_name: pg_admin 
volumes:
  pgdata:
