syntax = "proto3";

option go_package = "./proto;pb";
package productpb;

message ProductCreated {
    string id = 1;
    string name = 3;
    string description = 4;
    double price = 5;
}

message ProductPriceChanged {
    string id = 1;
    double delta = 2;
}

message ProductDeleted {
    string id = 1;
}